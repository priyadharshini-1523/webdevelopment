<html>
<head>
<title>Student login</title>
<style>
body 
{
    margin: 0;
    font-family: Arial;
    background: url("https://images.unsplash.com/photo-1523580846011-d3a5bc25702b") 
    no-repeat center center/cover;
}
.container
{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.box 
{
    background: rgba(255,255,255,0.95);
    padding: 25px;
    border-radius: 10px;
    width: 350px;
    text-align: center;
    box-shadow: 0px 0px 10px gray;
}
input, select 
{
    width: 90%;
    padding: 10px;
    margin: 6px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
button 
{
    width: 95%;
    padding: 10px;
    margin-top: 10px;
    background: #4facfe;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}
button:hover{ background: #007bff; }
.back { background: gray; }
.page { display:none; }
ul { padding:0; }
li {
    list-style:none;
    background:#eee;
    margin:5px;
    padding:10px;
    border-radius:5px;
}
.small {
    width:auto;
    padding:5px 10px;
    margin-left:5px;
}
.view { background:green; }
.delete { background:red; }
.captcha-box 
{
    background:#eee;
    padding:10px;
    margin:5px;
    border-radius:5px;
    font-weight:bold;
}
</style>
</head>
<body>
<div id="loginPage" class="container page" style="display:flex;">
<div class="box">
<h2>Login</h2>
<input id="loginUser" placeholder="Username or Email">
<input id="loginPass" type="password" placeholder="Password">
<div class="captcha-box">
    CAPTCHA: <span id="capText"></span>
    <button onclick="genCaptcha()" class="small">↻</button>
</div>
<input id="capInput" placeholder="Enter CAPTCHA">
<button onclick="login()">Login</button>
<p><a onclick="show('signupPage')">New User? Signup</a></p>
</div>
</div>
<div id="signupPage" class="container page">
<div class="box">
<h2>Signup</h2>
<input id="suName" placeholder="Username">
<input id="suEmail" placeholder="Email">
<input id="suPass" type="password" placeholder="Password">
<button onclick="signup()">Create Account</button>
<button class="back" onclick="show('loginPage')">Back</button>
</div>
</div>
<div id="homePage" class="container page">
<div class="box">
<h2>🎓 Dashboard</h2>
<button onclick="show('addPage')">Add Student</button>
<button onclick="show('listPage'); load()">View Students</button>
<button class="back" onclick="logout()">Logout</button>
</div>
</div>
<div id="addPage" class="container page">
<div class="box">
<h2>Add Student</h2>
<input id="stuName" placeholder="Name">
<input id="dob" placeholder="DOB">
<input id="age" placeholder="Age">
<input id="course" placeholder="Course">
<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>
<input id="email" placeholder="Email">
<input id="number" placeholder="Phone">
<input id="father" placeholder="Father Name">
<input id="mother" placeholder="Mother Name">
<button onclick="add()">Save</button>
<button class="back" onclick="show('homePage')">Back</button>
</div>
</div>
<div id="listPage" class="container page">
<div class="box">
<h2>Students</h2>
<ul id="list"></ul>
<button class="back" onclick="show('homePage')">Back</button>
</div>
</div>
<div id="viewPage" class="container page">
<div class="box">
<h2>Student Details</h2>
<p id="details"></p>
<button class="back" onclick="show('listPage')">Back</button>
</div>
</div>
<script>
function show(id)
{
    document.querySelectorAll(".page").forEach(p=>p.style.display="none");
    document.getElementById(id).style.display="flex";
}
let captcha = "";
function genCaptcha()
{
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    captcha = "";

    for(let i=0;i<6;i++)
    {
        captcha += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    document.getElementById("capText").innerText = captcha;
}
genCaptcha();
function signup()
{
    let name = document.getElementById("suName").value;
    let email = document.getElementById("suEmail").value;
    let pass = document.getElementById("suPass").value;
    if(name === "" || email === "" || pass === ""){
        alert("All fields required");
        return;
    }
    localStorage.setItem("user", name);
    localStorage.setItem("email", email);
    localStorage.setItem("pass", pass);
    alert("Account Created");
    show('loginPage');
}
function login()
{
    let inputCap = document.getElementById("capInput").value;
    if(inputCap !== captcha){
        alert("Wrong CAPTCHA");
        genCaptcha();
        return;
    }
    let userInput = document.getElementById("loginUser").value;
    let passInput = document.getElementById("loginPass").value;
    if(
        (userInput === localStorage.getItem("user") || 
         userInput === localStorage.getItem("email")) &&
        passInput === localStorage.getItem("pass")
    )
    {
        show('homePage');
    } 
    else
    {
        alert("Invalid Login");
        genCaptcha();
    }
}
function logout()
{
    show('loginPage');
}
function add()
{
    let name = document.getElementById("stuName").value;
    if(name === "")
    {
        alert("Name required");
        return;
    }
    let data = JSON.parse(localStorage.getItem("students")) || [];
    data.push({
        name: name,
        dob: document.getElementById("dob").value,
        age: document.getElementById("age").value,
        course: document.getElementById("course").value,
        gender: document.getElementById("gender").value,
        email: document.getElementById("email").value,
        number: document.getElementById("number").value,
        father: document.getElementById("father").value,
        mother: document.getElementById("mother").value
    });
    localStorage.setItem("students", JSON.stringify(data));
    alert("Student Added");
    show('homePage');
}
function load()
{
    let data = JSON.parse(localStorage.getItem("students")) || [];
    list.innerHTML="";
    data.forEach((s,i)=>{
        let li=document.createElement("li");
        li.innerHTML=`
        ${s.name}
        <button class="small view" onclick="view(${i})">View</button>
        <button class="small delete" onclick="del(${i})">Delete</button>
        `;
        list.appendChild(li);
    });
}
function view(i)
{
    let s = JSON.parse(localStorage.getItem("students"))[i];
    details.innerHTML=`
    Name: ${s.name}<br>
    DOB: ${s.dob}<br>
    Age: ${s.age}<br>
    Course: ${s.course}<br>
    Gender: ${s.gender}<br>
    Email: ${s.email}<br>
    Phone: ${s.number}<br>
    Father: ${s.father}<br>
    Mother: ${s.mother}
    `;

    show('viewPage');
}
function del(i)
{
    if(confirm("Are you sure?")){
        let data = JSON.parse(localStorage.getItem("students"));
        data.splice(i,1);
        localStorage.setItem("students",JSON.stringify(data));
        load();
    }
}
</script>
</body>
</html>
